# DenseNet-121 + Swin-T hybrid (v7): conservative imbalance tuning to improve F1 stability.
# Start fresh from ImageNet-pretrained backbones (no resume from old heads).
#
# Run:
#   py scripts/train.py --config configs/gpu_dense_swin_hybrid_v7.yaml
#
# After training:
#   py scripts/find_threshold.py --checkpoint <best-auc.ckpt> --config configs/gpu_dense_swin_hybrid_v7.yaml --split val
#   # paste per_class_thresholds into this file
#   py scripts/evaluate.py --checkpoint <best-auc.ckpt> --config configs/gpu_dense_swin_hybrid_v7.yaml --split test

experiment:
  name: gpu_dense_swin_hybrid_v7
  seed: 42

data:
  nih_root: "datasets/NIH Chest X-Rays Master Datasets/archive"
  chexpert_root: "datasets/Standford ML Group X-Rays Chest Master Datasets/cheXphoto-master/cheXphoto-master"
  csv_path: "datasets/NIH Chest X-Rays Master Datasets/archive/Data_Entry_2017.csv"
  image_size: [320, 320]
  num_workers: 3
  cache_dir: "data/processed_320_clahe"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  patient_split: true
  use_roi_extraction: true
  apply_roi_mask: true
  use_normalization: false

augmentations:
  legacy_cache_train_pipeline: true
  legacy_cache_minimal_erases: false
  horizontal_flip_prob: 0.5
  rotation_degrees: 10.0
  random_noise_std: 0.01
  use_gan_synthetic: false
  random_translate_frac: 0.035
  corner_erase_p: 0.0
  lower_artifact_erase_p: 0.58
  lower_artifact_erase_height_ratio: 0.26
  lower_artifact_erase_width_ratio: 0.30
  bottom_band_erase_p: 0.22
  bottom_band_erase_h_min: 0.08
  bottom_band_erase_h_max: 0.16
  lateral_edge_erase_p: 0.22
  lateral_edge_width_ratio: 0.06
  top_edge_erase_p: 0.14
  top_edge_height_ratio: 0.16
  device_artifact_erase_p: 0.30
  device_artifact_upper_ratio: 0.72
  device_artifact_threshold: 224
  device_artifact_min_area: 12
  device_artifact_max_area_ratio: 0.020
  device_artifact_max_components: 3
  random_erasing_p: 0.07
  random_erasing_scale: [0.02, 0.10]
  random_erasing_ratio: [0.3, 3.0]

training:
  batch_size: 4
  max_epochs: 80
  early_stopping_patience: 8
  early_stopping_monitor: val_auc
  early_stopping_mode: max
  precision: "16-mixed"
  accumulate_grad_batches: 4
  optimizer: adamw
  learning_rate: 0.00003
  backbone_lr_mult: 0.12
  swa_epoch_start: null
  weight_decay: 0.005
  scheduler: cosine
  warmup_epochs: 1
  gradient_clip_val: 1.0
  # Mild weighted sampling to increase positive exposure without overwhelming negatives.
  use_weighted_sampling: true
  weighted_sampling_dampen: 0.97
  prediction_threshold: 0.80
  f1_metric_threshold: 0.05
  # Val tune from find_threshold.py on best-auc ckpt (v7 ep9).
  per_class_thresholds: [0.9300, 0.9350]  # [Nodule, Fibrosis]

model:
  backbone: dense_swin_hybrid
  pretrained: true
  dropout: 0.25
  num_classes: 2
  # Slightly reduced fibrosis weight to avoid over-shifting all logits upward.
  class_weights: [1.0, 4.5]

loss:
  name: asymmetric
  gamma_neg: 1.5
  gamma_pos_per_class: [1.6, 2.2]
  clip_per_class: [0.02, 0.14]
  class_weight_mode: positive_only
  # Lower auxiliary BCE / smoothing than v6 to reduce calibration collapse pressure.
  bce_aux_weight: 0.02
  label_smoothing: 0.005
